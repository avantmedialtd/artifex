name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: istvan32/builder:latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set build name from tag
        run: |
          TAG=$(git tag --contains HEAD)
          if [ -n "$TAG" ]; then
            echo "Tagged version: $TAG"
            echo "TAGGED_VERSION=$TAG" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format:check

      - name: Spell check
        run: bun run spell:check

      - name: Test
        run: bun run test
